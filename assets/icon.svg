<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#2c3e50"/>
  
  <!-- Outer box -->
  <rect x="80" y="100" width="352" height="320" fill="none" stroke="#3498db" stroke-width="12" rx="10"/>
  
  <!-- Top flap left -->
  <path d="M 120 100 Q 120 60 160 60 L 300 60 Q 340 60 340 100" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Top flap right -->
  <path d="M 380 100 Q 380 60 340 60" fill="none"/>
  
  <!-- Tape across top -->
  <rect x="150" y="75" width="212" height="25" fill="#e74c3c" rx="5" opacity="0.8"/>
  
  <!-- Package handle -->
  <path d="M 200 100 Q 200 50 256 45 Q 312 50 312 100" fill="none" stroke="#27ae60" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Barcode -->
  <g x="120" y="200">
    <rect x="120" y="180" width="6" height="60" fill="#2c3e50"/>
    <rect x="135" y="180" width="4" height="60" fill="#2c3e50"/>
    <rect x="148" y="180" width="5" height="60" fill="#2c3e50"/>
    <rect x="162" y="180" width="3" height="60" fill="#2c3e50"/>
    <rect x="175" y="180" width="6" height="60" fill="#2c3e50"/>
    <rect x="190" y="180" width="4" height="60" fill="#2c3e50"/>
  </g>
  
  <!-- Package text/label -->
  <circle cx="350" cy="220" r="30" fill="#f39c12" opacity="0.7"/>
  <text x="350" y="230" font-size="20" text-anchor="middle" fill="#2c3e50" font-weight="bold">📦</text>
  
  <!-- Bottom shadow -->
  <ellipse cx="256" cy="430" rx="160" ry="20" fill="#000" opacity="0.2"/>
</svg>
